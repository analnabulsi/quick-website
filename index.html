<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fun Question</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f5f5f5;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 400px;
        margin: auto;
    }

    img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        background-color: #ddd;
        border-radius: 10px;
    }

    .buttons {
        margin-top: 30px;
        position: relative;
        height: 200px;
    }

    button {
        padding: 12px 25px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        position: absolute;
        transition: all 0.2s ease;
    }

    #yesBtn {
        background-color: #28a745;
        color: white;
        left: 25%;
    }

    #noBtn {
        background-color: #dc3545;
        color: white;
        left: 60%;
    }

    #message {
        display: none;
        margin-top: 20px;
        font-size: 20px;
        color: #333;
        animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
    }
</style>
</head>

<body>

<div class="container">
    <h2>Do you agree?</h2>

    <!-- Image Placeholder -->
    <img src="https://via.placeholder.com/400x250" alt="Placeholder Image">

    <!-- Buttons -->
    <div class="buttons">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <!-- Message -->
    <div id="message">🎉 Yay! I knew it! 😄</div>
</div>

<!-- Sound Effect -->
<audio id="noSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const container = document.querySelector(".buttons");
    const message = document.getElementById("message");
    const sound = document.getElementById("noSound");

    function moveButton() {
        const containerRect = container.getBoundingClientRect();

        const maxX = containerRect.width - noBtn.offsetWidth;
        const maxY = containerRect.height - noBtn.offsetHeight;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";

        // Play sound
        sound.currentTime = 0;
        sound.play();
    }

    // Escape events
    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("touchstart", moveButton);

    // YES button click
    yesBtn.addEventListener("click", () => {
        message.style.display = "block";
    });
</script>

</body>
</html>
