<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        margin: 0;
        padding: 20px;
        overflow: hidden;
    }

    .container {
        max-width: 400px;
        margin: auto;
    }

    h2 {
        color: white;
        font-size: 26px;
    }

    img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .buttons {
        margin-top: 30px;
        position: relative;
        height: 220px;
    }

    button {
        padding: 14px 28px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        position: absolute;
        transition: all 0.25s ease;
    }

    #yesBtn {
        background: #ff4d6d;
        color: white;
        left: 20%;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    #noBtn {
        background: #6c757d;
        color: white;
        left: 60%;
    }

    #message {
        display: none;
        margin-top: 25px;
        font-size: 22px;
        color: white;
        animation: pop 0.6s ease;
    }

    #noMessage {
        margin-top: 15px;
        font-size: 16px;
        color: white;
        min-height: 20px;
        transition: opacity 0.3s;
    }

    @keyframes pop {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        font-size: 20px;
        animation: floatUp 3s linear forwards;
    }

    @keyframes floatUp {
        from {
            transform: translateY(0);
            opacity: 1;
        }
        to {
            transform: translateY(-400px);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h2>You are not made from me?</h2>

    <img src="https://live.staticflickr.com/2924/14204033065_4d17e9a493_b.jpg" alt=" Image">

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>

    <div id="noMessage"></div>
    <div id="message">💖 You just made me the happiest person! 💖</div>
</div>

<!-- Sounds -->
<audio id="noSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="yesSound" src="https://www.soundjay.com/human/cheer-01.wav"></audio>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const container = document.querySelector(".buttons");
    const noMessage = document.getElementById("noMessage");
    const message = document.getElementById("message");

    const noSound = document.getElementById("noSound");
    const yesSound = document.getElementById("yesSound");

    // Random funny messages
    let messages = [
        "Are you sure? 😢",
        "Really sure? 🤨",
        "Think again... 💔",
        "Don’t do this to me 😭",
        "I’m getting sad now 🥺",
        "This is not going well 😅",
        "Okay this is awkward 😬",
        "You’re testing my patience 😤",
        "Still no?? 😳",
        "I’ll keep running 😎",
        "You can’t catch me 😜",
        "I know you want YES 😉",
        "Stop trying 😏",
        "This button has trust issues 😂",
        "Love always wins ❤️"
    ];

    let lastIndex = -1;
    let attempts = 0;

    function getRandomMessage() {
        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * messages.length);
        } while (newIndex === lastIndex);

        lastIndex = newIndex;
        return messages[newIndex];
    }

    function moveButton() {
        const rect = container.getBoundingClientRect();

        const maxX = rect.width - noBtn.offsetWidth;
        const maxY = rect.height - noBtn.offsetHeight;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";

        // Show random message
        noMessage.style.opacity = 0;
        setTimeout(() => {
            attempts++;
            noMessage.textContent = getRandomMessage() + " (Try #" + attempts + ")";
            noMessage.style.opacity = 1;
        }, 150);

        // Sound
        noSound.currentTime = 0;
        noSound.play();

        // Make YES button slightly bigger each time 😏
        let scale = 1 + attempts * 0.05;
        yesBtn.style.transform = "scale(" + scale + ")";
    }

    // Desktop + Mobile
    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("touchstart", moveButton);

    yesBtn.addEventListener("click", () => {
        message.style.display = "block";
        yesSound.play();

        // Floating hearts animation
        for (let i = 0; i < 20; i++) {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.top = window.innerHeight + "px";

            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 3000);
        }
    });
</script>

</body>
</html>
